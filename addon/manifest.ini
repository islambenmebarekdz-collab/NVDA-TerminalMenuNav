name = terminalMenuNav
summary = "Terminal Menu Navigator"
description = "Makes interactive CLI menus in terminals usable with speech: announces only the currently pointed option and its position instead of re-reading the whole repainted block. Toggle with NVDA+alt+l; announce current selection with NVDA+alt+k."
author = "Islam Benmebarek <islam.benmebarek.dz@gmail.com>"
version = 0.2.1
